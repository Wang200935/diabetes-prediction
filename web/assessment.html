<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>開始評估 | 糖尿病風險評估中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="assessment">
    <div class="site-bg"></div>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="/">糖尿病風險評估中心</a>
        <nav class="nav">
          <a href="/">首頁</a>
          <a href="/assessment" class="active">開始評估</a>
          <a href="/about">關於模型</a>
        </nav>
      </header>

      <main class="page page-assessment">
        <section class="page-intro">
          <p class="eyebrow">開始評估</p>
          <h1>填答你的健康狀況</h1>
          <p>
            依照你的健康狀況與生活習慣填答，完成後即可查看風險結果與建議。
          </p>
        </section>

        <section class="step-strip">
          <div class="step-chip active">
            <span>01</span>
            <strong>填答問卷</strong>
          </div>
          <div class="step-chip">
            <span>02</span>
            <strong>取得風險結果</strong>
          </div>
          <div class="step-chip">
            <span>03</span>
            <strong>查看建議方向</strong>
          </div>
        </section>

        <section class="card questionnaire-card wide-card">
          <div class="card-head">
            <div>
              <p class="section-kicker">Questionnaire</p>
              <h2>健康問答</h2>
            </div>
          </div>

          <section class="bmi-helper">
            <div class="bmi-helper-head">
              <div>
                <p class="section-kicker">BMI 小工具</p>
                <h3>如果你不知道自己的 BMI，可以先在這裡算</h3>
              </div>
              <button type="button" id="fillCalculatedBmi" class="ghost-button small-button">帶入問卷 BMI</button>
            </div>
            <div class="field-grid">
              <div class="field">
                <label for="bmiHeight">身高（公分）</label>
                <input id="bmiHeight" type="number" min="100" max="250" step="0.1" placeholder="例如 168" />
              </div>
              <div class="field">
                <label for="bmiWeight">體重（公斤）</label>
                <input id="bmiWeight" type="number" min="20" max="300" step="0.1" placeholder="例如 60" />
              </div>
            </div>
            <div class="bmi-output">
              <div class="bmi-output-main">
                <span>BMI 計算結果</span>
                <strong id="bmiCalculatedValue">--</strong>
              </div>
              <div class="bmi-output-meta">
                <span id="bmiCalculatedBadge" class="bmi-badge neutral">等待輸入</span>
                <p id="bmiCalculatedHint">輸入身高與體重後，系統會自動算出 BMI。</p>
              </div>
            </div>
            <div class="bmi-helper-note">
              <strong>什麼時候需要用這個工具？</strong>
              <p>如果你知道自己的 BMI，可以直接填問卷；如果不知道，就先在這裡快速換算。</p>
            </div>
          </section>

          <form id="predictionForm" class="questionnaire-form">
            <div id="questionnaireSections" class="questionnaire-sections"></div>
            <div class="form-actions">
              <button type="submit" class="primary-button">送出並查看結果</button>
              <button type="button" id="fillDemo" class="secondary-button">填入示範資料</button>
            </div>
            <p id="formError" class="form-error" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
